runtime:
  mode: ray
  model_gpus: 1
  sampler_gpus: 1
  sampler_tp: 1
  lazy_collect: false

training_context:
  tenant_id: tenant_a
  training_run_id: gsm8k_grpo_server_run_001
  base_model_id: ms://Qwen/Qwen3.5-0.8B
  adapter_name: tenant_a_gsm8k_lora
  reward_type: gsm8k
  loss_type: grpo
  tool_profile: default

training_contexts:
  - tenant_id: tenant_a
    training_run_id: gsm8k_grpo_server_run_001
    base_model_id: ms://Qwen/Qwen3.5-0.8B
    adapter_name: tenant_a_gsm8k_lora
    reward_type: gsm8k
    loss_type: grpo
    tool_profile: default
  - tenant_id: tenant_b
    training_run_id: gsm8k_grpo_server_run_002
    base_model_id: ms://Qwen/Qwen3.5-0.8B
    adapter_name: tenant_b_gsm8k_lora
    reward_type: gsm8k
    loss_type: grpo
    tool_profile: default

model:
  mesh:
    tp_size: 1
    ep_size: 1
    pp_size: 1
    sequence_parallel: false
  mixed_precision: bf16
  lora:
    target_modules: all-linear
    r: 16
    lora_alpha: 32
    lora_dropout: 0.05
  gradient_accumulation_steps: 1
  loss:
    cls: GRPOLoss
    epsilon: 0.2
  optimizer:
    cls: default
    lr: 5.0e-5
  lr_scheduler:
    cls: default
    lr_decay_steps: 1000
    max_lr: 5.0e-5
  processor:
    cls: InputProcessor
  template:
    cls: Qwen3_5Template
    max_length: 4096
    truncation_strategy: delete
    enable_thinking: false
  adapter_checkpoint_dir: output/async_multi_lora_grpo/lora_sync

sampler:
  engine_args:
    gpu_memory_utilization: 0.8
    max_model_len: 8192
    max_lora_rank: 16
    enable_lora: true
    enable_tower_connector_lora: true
  template:
    cls: Qwen3_5Template
    enable_thinking: false
  sampling_params:
    max_tokens: 4096
    num_samples: 1
    logprobs: 1
    temperature: 1.0
    top_p: 0.95
  num_generations: 8

dataset:
  dataset_id: ms://modelscope/gsm8k
  subset_name: main
  split: train
  data_num: 2000
  batch_size: 4
  system_prompt: >-
    You are a helpful math assistant. Solve the problem with minimal but
    correct reasoning and put your final answer within \boxed{}.

pipeline:
  max_steps: 1000
  max_staleness: 1
  target_groups_per_partition: 1
  max_concurrent_groups: 16
  max_submit_groups: 1
  reward_batch_size: 1024
  advantage_batch_size: 1024
  mini_batch_size: 4
  micro_batch_size: 1
  save_name_prefix: async-grpo-lora-sync
  save_optimizer: false
  is_sampler_checkpoint: false
  max_grad_norm: 1.0
  norm_type: 2

transfer_queue:
  init: true
  total_storage_size: 200000
  max_rows: 4096
  max_rows_per_context: 2048
  num_data_storage_units: 4
  storage_backend: SimpleStorage
